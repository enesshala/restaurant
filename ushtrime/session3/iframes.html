<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>iFrames in HTML</h1>

        <iframe
            src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d304.8776951478238!2d21.14943358824477!3d42.373410687187196!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2s!4v1775757477542!5m2!1sen!2s"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
        ></iframe>

        <iframe
            src="https://makerminds.org"
            width="500px"
            height="500px"
            frameborder="0"
        ></iframe>

        <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/xPPLbEFbCAo?si=lSc5ZKNjrNHCfb2O"
            title="YouTube video player"
            frameborder="0"
            allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
        ></iframe>
    </body>
</html>
